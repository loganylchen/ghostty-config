# Programming-optimized configuration
# Best settings for coding sessions

# Larger font for better readability
font-size = 13

# More scrollback for long outputs
scrollback-limit = 50000

# Better contrast
background = 1a1b26
foreground = c0caf5

# Faster cursor (no blink)
cursor-style-blink = false

# Enable all shell integration features
shell-integration-features = cursor,sudo,title,ssh

# Copy on select for quick copying
copy-on-select = true

# Show command in window title
window-title = {command} - {pwd}

# Desktop notifications for long-running commands
command-notify = true
