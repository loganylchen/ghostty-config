# Presentation-optimized configuration
# Large fonts for demos and presentations

# Much larger font
font-size = 18

# Bold text for visibility
font-style = bold

# High contrast theme
background = 000000
foreground = ffffff

# Large padding for readability
window-padding-x = 20
window-padding-y = 20

# Bigger cursor
cursor-style = block

# No distractions
window-decoration = false
mouse-hide-while-typing = true

# Desktop notifications off during presentations
desktop-notifications = false
