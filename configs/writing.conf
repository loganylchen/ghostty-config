# Writing-optimized configuration
# Better for documentation and writing

# Larger font for comfortable reading
font-size = 14

# Warmer background for long sessions
background = 1e2127
foreground = dcdfe4

# More line spacing
adjust-line-height = 10%

# Longer scrollback for documentation
scrollback-limit = 20000

# Softer cursor
cursor-style = bar
cursor-style-blink = false
cursor-color = 98c379

# Lighter selection
selection-background = 3e4451
selection-foreground = dcdfe4
